# Optional automated eval manifest.
#
# This file is intentionally a checked-in placeholder until public or otherwise
# non-interactive datasets are registered under $TABVISION_DATA_ROOT. An empty
# manifest is not a v1 release blocker; v1 gates use deterministic smoke,
# checked-in fixtures, GuitarSet validation reports, license checks, and
# fresh-install verification.
#
#   tabvision-eval --manifest tabvision/data/eval/manifest.toml --check
